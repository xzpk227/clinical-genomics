services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - PORT=8000
      - LLM_SUMMARY_ENABLED=${LLM_SUMMARY_ENABLED:-false}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-google/medgemma-4b-it}
      - REGRESSION_ACCURACY_THRESHOLD=${REGRESSION_ACCURACY_THRESHOLD:-0.70}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  huggingface_cache:
    driver: local
