name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip dependencies keyed on pyproject.toml hash
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-

      # Cache HuggingFace model weights keyed on pyproject.toml hash
      # (model name is pinned in PipelineConfig.embedding_model_name)
      - name: Cache HuggingFace model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            hf-models-

      # Cache FAISS index keyed on hpo_database.json hash (rebuilt when HPO data changes)
      - name: Cache FAISS index
        uses: actions/cache@v4
        with:
          path: |
            data/hpo_index.faiss
            data/hpo_id_map.json
          key: faiss-index-${{ hashFiles('data/hpo_database.json') }}
          restore-keys: |
            faiss-index-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download spaCy blank model
        run: python -m spacy download en_core_web_sm || true

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

      - name: Build HPO database (if not cached)
        run: |
          if [ ! -f data/hpo_database.json ]; then
            echo "data/hpo_database.json not found — skipping regression test"
            echo "SKIP_REGRESSION=true" >> $GITHUB_ENV
          fi

      - name: Build FAISS index (if not cached)
        if: env.SKIP_REGRESSION != 'true'
        run: |
          if [ ! -f data/hpo_index.faiss ]; then
            echo "data/hpo_index.faiss not found — skipping regression test"
            echo "SKIP_REGRESSION=true" >> $GITHUB_ENV
          fi

      - name: Run regression test
        if: env.SKIP_REGRESSION != 'true'
        run: pytest tests/regression/ -v --tb=short
